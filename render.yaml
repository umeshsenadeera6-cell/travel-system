services:
  - type: web
    name: travel-system
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npm start --prefix backend
    healthCheckPath: /api/status
    envVars:
      - key: MYSQL_URI
        sync: false
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_SECRET
        sync: false
